name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Run all JavaScript actions (incl. the ones nested inside the Pages actions) on
# Node 24, so the Node 20 runtime deprecation warning goes away.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress and latest queued run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Build single-file game
        run: npm run build
      - name: Assemble site
        run: |
          mkdir -p _site
          cp dark-castle.html _site/index.html
          cp -r assets _site/assets
          rm -rf _site/assets/raw _site/assets/audio/raw   # high-res sources, not needed live
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
