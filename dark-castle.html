<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Dark Castle</title>
<style>/* Dark Castle — Amiga-style look */

/* The original Amiga system font (Topaz, Kickstart 1.x / Amiga 500). A faithful
   TrueType remake by dMG/Trueschool (github.com/rewtnull/amigafonts, GPL-FE).
   It's an 8px bitmap font, so it stays crispest at multiples of 8 (16/24/32px). */
@font-face {
  font-family: "Topaz";
  src: url("assets/fonts/Topaz_a500_v1.0.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

:root {
  --paper: #000018;            /* dark Amiga blue-black */
  --frame: #6a6a8a;
  --frame2: #2a2a44;
  --pen0:#000000; --pen1:#ffffff;
  --pen2:#ffd86b; --pen4:#ff5a4d; --pen5:#6bd0ff; --pen7:#ffffff;
  --pen9:#6bff7a; --pen10:#ffa94d; --pen11:#c08bff; --pen12:#4da6ff;
  --pen13:#ff8bd0; --pen14:#9bffd0; --pen15:#ffe066;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; height: 100%;
  background: #11131a;
  color: var(--pen7);
  font-family: "Topaz", "Courier New", ui-monospace, monospace;
  font-size: 16px;        /* base; Topaz is sharpest at multiples of 8 */
}

#amiga {
  max-width: 760px;
  margin: 0 auto;
  height: 100vh;       /* fixed to the viewport so the page itself never scrolls */
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--paper);
  border-left: 2px solid var(--frame2);
  border-right: 2px solid var(--frame2);
}

#screen1 {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  padding: 10px 12px;
  min-height: 0;       /* allow this flex child to shrink so #text can scroll inside it */
  overflow: hidden;
}

#bild {
  flex: 0 0 auto;
  height: 120px;
  margin-bottom: 8px;
  border: 1px solid var(--frame2);
  background:
    repeating-linear-gradient(45deg, #14142c 0 10px, #10101f 10px 20px);
  color: var(--frame);
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 13px;
  image-rendering: pixelated;
}
#bild img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

.mute {
  position: fixed;
  top: 8px;
  right: 8px;
  z-index: 10;
  font: inherit;
  font-size: 16px;
  color: var(--pen7, #c8c8c8);
  background: #07070f;
  border: 1px solid var(--frame2, #444);
  border-radius: 4px;
  padding: 6px 12px;
  cursor: pointer;
  opacity: 0.9;
}
.mute:hover { opacity: 1; }

/* Intro: big castle picture on top, single-line horizontal ticker band below
   (like the original Amiga scroller). */
.intro { display: flex; flex-direction: column; height: 100%; gap: 6px; }
.intro-pic { flex: 1 1 auto; min-height: 0; width: 100%; object-fit: contain; image-rendering: pixelated; }
.marquee-clip { flex: 0 0 auto; width: 100%; height: 1.8em; overflow: hidden; display: flex; align-items: center; }
.intro-text { flex: 0 0 auto; text-align: center; padding: 4px 0; }
.fade-black { position: fixed; inset: 0; background: #000; opacity: 0; z-index: 50; pointer-events: none; }
.marquee-lane { display: flex; flex-wrap: nowrap; white-space: nowrap; will-change: transform; }
.marquee-item {
  white-space: nowrap;
  padding-right: 160px;
  font-size: 16px;
  letter-spacing: 1px;
  color: var(--pen7, #c8c8c8);
}

/* Ending credits: the sunset picture stays fixed on top, the credits scroll only
   in the band below it (as in the original — the text never rises over the picture). */
.endscreen { display: flex; flex-direction: column; height: 100%; }
.end-pic { flex: 0 0 auto; width: 100%; height: auto; max-height: 72%; object-fit: contain; image-rendering: pixelated; }
.end-clip { flex: 1 1 auto; min-height: 0; overflow: hidden; position: relative; }
.end-scroll { position: absolute; left: 0; right: 0; top: 0; will-change: transform; }

#text {
  flex: 1 1 auto;
  min-height: 0;       /* required so the text area scrolls instead of growing the page */
  overflow-y: auto;
  line-height: 1.45;
  font-size: 16px;
  white-space: pre-wrap;
  word-break: break-word;
}
#text .ln { margin: 0; }
#text .blank { height: 0.7em; }

#screen2 {
  flex: 0 0 auto;
  background: #07070f;
  border-top: 2px solid var(--frame2);
  padding: 10px 12px;
  min-height: 150px;
}

/* verb menu */
.verbgrid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: start; }
.verbcol { display: flex; flex-direction: column; gap: 6px; }
.btn {
  font-family: inherit; font-size: 16px;
  background: #14142c; color: var(--pen2);
  border: 1px solid var(--frame2); border-radius: 3px;
  padding: 8px 10px; cursor: pointer; text-align: left;
  min-height: 40px;
}
.btn:hover, .btn:focus { background: #20204a; color: var(--pen15); outline: none; }
.btn:active { background: #2c2c5e; }

.cross { display: grid; grid-template-columns: 40px 40px 40px; grid-template-rows: 40px 40px 40px; gap: 4px; justify-content: center; }
.cross .btn { text-align: center; padding: 0; display: flex; align-items: center; justify-content: center; color: var(--pen9); }
.cross .v { grid-column: 2; grid-row: 1; }
.cross .l { grid-column: 1; grid-row: 2; }
.cross .r { grid-column: 3; grid-row: 2; }
.cross .h { grid-column: 2; grid-row: 3; }
.cross .mid { grid-column: 2; grid-row: 2; opacity: 0.3; border: none; background: none; }

/* prompt input */
.prompt { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.prompt label { color: var(--pen2); }
.prompt input {
  flex: 1 1 160px; font-family: inherit; font-size: 16px;
  background: #02020a; color: var(--pen7);
  border: 1px solid var(--frame); padding: 8px; border-radius: 3px;
}

/* click-to-pick nouns (room objects + inventory) */
.nounpick { display: flex; flex-direction: column; gap: 4px; }
.nountitle { color: var(--pen2); margin-bottom: 2px; }
.noungroup { color: var(--pen9); font-size: 13px; letter-spacing: 1px; margin-top: 4px; }
.nounrow { display: flex; gap: 6px; flex-wrap: wrap; }
.nounrow .btn { text-align: center; }
.btn.cancel { align-self: flex-start; color: var(--pen4); margin-top: 8px; min-height: 32px; }

/* menu / overlay actions */
.actions { display: flex; gap: 8px; flex-wrap: wrap; }
.menu-list .btn { color: var(--pen7); font-size: 16px; }

/* tresor */
.tresor-digits { font-size: 32px; letter-spacing: 10px; text-align: center; color: var(--pen15); margin: 6px 0; white-space: pre; }
.tresor-pos { font-size: 32px; letter-spacing: 10px; text-align: center; color: var(--pen5); white-space: pre; margin-top: -4px; }
.tresor-time { text-align: center; color: var(--pen4); margin: 6px 0; }

.center { text-align: center; }
.title { color: var(--pen12); font-size: 24px; text-align: center; margin: 8px 0 16px; letter-spacing: 2px; }

/* help system */
.help-btn {
  position: fixed; top: 8px; left: 8px; z-index: 10;
  font: inherit; font-size: 16px; color: var(--pen2);
  background: #07070f; border: 1px solid var(--frame2); border-radius: 4px;
  padding: 6px 12px; cursor: pointer; opacity: 0.9;
}
.help-btn:hover { opacity: 1; }

/* DE/EN language switch, just below the help button (top-left corner) */
.lang-switch { position: fixed; top: 44px; left: 8px; z-index: 10; display: flex; gap: 4px; }
.lang-switch button {
  font: inherit; font-size: 13px; color: var(--pen7);
  background: #07070f; border: 1px solid var(--frame2); border-radius: 4px;
  padding: 4px 8px; cursor: pointer; opacity: 0.85;
}
.lang-switch button:hover { opacity: 1; }
.lang-switch button.active { color: var(--pen2); background: #14142c; border-color: var(--frame); opacity: 1; }

.help-overlay {
  position: fixed; inset: 0; z-index: 60; display: flex;
  align-items: center; justify-content: center;
  background: rgba(0, 0, 24, 0.72);
}
.help-box {
  max-width: 520px; margin: 0 16px; padding: 18px 20px;
  background: #0c0c20; border: 2px solid var(--frame); border-radius: 6px;
}
.help-text { color: var(--pen14); line-height: 1.5; margin-bottom: 14px; min-height: 3em; }

@media (max-width: 520px) {
  #text { font-size: 16px; }
  .btn { font-size: 16px; }
  .title { font-size: 16px; }   /* keep spaced titles on one line on narrow screens */
}
</style>
</head>

  "Der Wind raunt mir klar zu: Geh zurück (nach Rechts, R) und besorg erst das vergiftete Bier.": "The wind murmurs to me clearly: Go back (right, R) and first fetch the poisoned beer.",

  "Der Wind raunt mir zu, dass bloße Hände an dieser zähen Leine nichts ausrichten — ich brauche etwas Scharfes, um sie zu durchtrennen.": "The wind murmurs to me that bare hands achieve nothing against this tough line — I need something sharp to cut through it.",
  "Der Wind raunt mir zu, daß der schwere goldene Schlüssel in meiner Tasche genau hierher gehört, ins Schloss dieser Zelle.": "The wind murmurs to me that the heavy gold key in my pocket belongs right here, in the lock of this cell.",
  "Der Wind raunt mir zu, dass dieses merkwürdige Buch nicht zum Lesen, sondern zum Drücken gedacht ist.": "The wind murmurs to me that this strange book is meant not for reading, but for pressing.",
  "Der Wind raunt mir zu, dass hinter der Schwelle ein Wohnzimmer auf mich wartet und ich diese kahlen Wände endlich verlassen sollte.": "The wind murmurs to me that a living room awaits me beyond the threshold and that I should finally leave these bare walls.",
  "Der Wind raunt mir zu, daß ich in der Küche etwas Trinkbares finden kann, um den vergifteten Trunk vorzubereiten.": "The wind murmurs to me that I can find something drinkable in the kitchen to prepare the poisoned drink.",
  "Der Wind raunt mir zu, dass ich mich genauer mit dem offenen Arztkoffer befassen und sein Inneres mustern sollte.": "The wind murmurs to me that I should take a closer look at the open doctor's bag and inspect its insides.",
  "Der Wind raunt mir zu, dass ich mich nach einem langen Hilfsmittel umsehen sollte, mit dem sich der ferne Stein näher heranholen ließe.": "The wind murmurs to me that I should look around for some long implement with which the distant stone could be pulled closer.",
  "Der Wind raunt mir zu, dass mich nichts mehr in diesem Abstellraum hält und ich denselben Weg zurücknehmen sollte, der mich hergeführt hat.": "The wind murmurs to me that nothing keeps me in this storage room anymore, and I should take back the same path that led me here.",
  "Der Wind raunt mir zu, dass mir die merkwürdige grüne Frucht noch von Nutzen sein könnte, so gefährlich sie auch wirken mag, und nicht am Ast verbleiben sollte.": "The wind murmurs to me that the peculiar green fruit could still be of use to me, as dangerous as it may seem, and shouldn't be left on the branch.",
  "Der Wind raunt mir zu, dass mir jenes baumelnde Stück Wäscheleine nützen könnte, wenn ich nur ein Ende davon durchtrennen würde.": "The wind murmurs to me that that dangling piece of clothesline could serve me, if only I were to cut through one end of it.",
  "Der Wind raunt mir zu, dass nur rohe, übermenschliche Stärke diese Bestie bezwingt — und dass ich mir diese Kraft besorgen muss, bevor ich auch nur einen Schritt weiter wage.": "The wind murmurs to me that only raw, superhuman strength can subdue this beast — and that I must get hold of that strength before I dare even one step further.",
  "Der Wind raunt mir zu, ich solle nicht über die Matte steigen, sondern nachsehen, was sie so beflissen bedeckt.": "The wind murmurs to me that I shouldn't step over the mat, but rather check what it is so eagerly covering.",

  "Ein leises Unbehagen beschleicht mich, als mein Blick im Wohnzimmer auf den schweren Arztkoffer fällt - ob darin etwas Nützliches verborgen liegt?": "A quiet unease creeps over me as my gaze falls on the heavy doctor's bag in the living room - could something useful be hidden inside it?",

  "Eine innere Stimme flüstert mir zu, dass der Arztkoffer dort nicht ohne Grund liegt – sein Inneres birgt etwas.": "An inner voice whispers to me that the doctor's bag there doesn't lie there without reason – its insides hold something.",
  "Eine innere Stimme flüstert mir zu, dass der goldene Schlüssel, den ich so lange bei mir trage, genau in dieses eine Schloss gehört.": "An inner voice whispers to me that the gold key I've carried with me for so long fits exactly this one lock.",
  "Eine innere Stimme flüstert mir zu, dass der Hund, der den Weg versperrt, mir nun nichts mehr anhaben kann und ich getrost an ihm vorbei in Richtung Agathe schreiten soll.": "An inner voice whispers to me that the dog blocking the way can no longer harm me, and I may confidently stride past it toward Agathe.",
  "Eine innere Stimme flüstert mir zu, daß der Ursprung des Gestanks hinter einer geschlossenen Tür verborgen liegt und nur darauf wartet, ans Licht geholt zu werden.": "An inner voice whispers to me that the source of the stench lies hidden behind a closed door, just waiting to be brought to light.",
  "Eine innere Stimme flüstert mir zu, dass der Weg über die Treppe nun frei vor mir liegt.": "An inner voice whispers to me that the way up the stairs now lies clear before me.",
  "Eine innere Stimme flüstert mir zu, daß ein durstiger Wächter einen dargebotenen Trunk eher annimmt, als sich roher Gewalt zu beugen — und daß die Küche so manches Gebräu bereithält.": "An inner voice whispers to me that a thirsty guard will sooner accept a proffered drink than bow to brute force — and that the kitchen holds many a brew.",
  "Eine innere Stimme flüstert mir zu, dass es sich lohnen könnte, das Innere des verrosteten Kästchens genauer in Augenschein zu nehmen, statt achtlos daran vorbeizugehen.": "An inner voice whispers to me that it might be worth taking a closer look at the inside of the rusted little box, rather than carelessly walking past it.",
  "Eine innere Stimme flüstert mir zu, dass hier alles erledigt ist und der Weg zurück in den Flur, woher ich gekommen bin, hinter mir liegt.": "An inner voice whispers to me that everything here is done, and the way back into the hallway I came from lies behind me.",
  "Eine innere Stimme flüstert mir zu, dass hier nur die rohe Gewalt eines harten Gegenstandes hilft, um das morsche Glas zu überwinden.": "An inner voice whispers to me that only the brute force of a hard object will help here, to get past the rotten glass.",
  "Eine innere Stimme flüstert mir zu, dass ich allen Mut zusammennehmen und mich durch das offene Fenster ins Freie wagen muss — vielleicht braucht es mehr als einen Anlauf.": "An inner voice whispers to me that I must gather all my courage and venture out into the open through the open window — it may take more than one try.",
  "Eine innere Stimme flüstert mir zu, dass ich das, was dort im Briefkasten steckt, an mich nehmen sollte.": "An inner voice whispers to me that I should take whatever is tucked in the mailbox there.",
  "Eine innere Stimme flüstert mir zu, dass ich die Zelle selbst gründlich in Augenschein nehmen muss — besonders das, was sie verschlossen hält.": "An inner voice whispers to me that I must inspect the cell itself thoroughly — especially what keeps it locked.",
  "Eine innere Stimme flüstert mir zu, dass ich diesen Raum verlassen, den Rückweg antreten und danach höher hinaufsteigen sollte.": "An inner voice whispers to me that I should leave this room, head back the way I came, and then climb higher.",
  "Eine innere Stimme flüstert mir zu, dass im Koffer ein feines Instrument liegt, mit dem sich kleinste Geräusche belauschen lassen - wie geschaffen dafür, einem Tresor seine Geheimnisse zu entlocken.": "An inner voice whispers to me that inside the bag lies a fine instrument with which the faintest sounds can be listened in on - as if made to coax a safe into giving up its secrets.",
  "Eine innere Stimme flüstert mir zu, dass mir das rechte Werkzeug fehlt — etwas Schweres, das ich noch nicht bei mir trage und drüben im Flur liegen sah.": "An inner voice whispers to me that I'm missing the right tool — something heavy that I'm not yet carrying and saw lying over in the hallway.",
  "Eine innere Stimme flüstert mir zu, dass mir das verrostete Werkzeug, das dort am Boden liegt, noch gute Dienste leisten könnte.": "An inner voice whispers to me that the rusty tool lying there on the floor could still serve me well.",
  "Eine innere Stimme flüstert mir zu, dass mir der rote Trank dort drüben ungeahnte Kräfte verleihen könnte.": "An inner voice whispers to me that the Red Potion over there could grant me undreamed-of powers.",
  "Eine innere Stimme flüstert mir zu, dass mir etwas Scharfes zum Schneiden fehlt — eine Drahtschere, wie sie unten im Abstellraum in einer Kiste liegt.": "An inner voice whispers to me that I'm missing something sharp for cutting — wire cutters, like the ones lying in a crate down in the storage room.",
  "Eine innere Stimme flüstert mir zu, dass mir noch ein Werkzeug zum Schneiden fehlt — und dass ich es im Abstellraum nebenan finden würde, wenn ich nur die richtige Richtung einschlüge.": "An inner voice whispers to me that I'm still missing a tool for cutting — and that I'd find it in the storage room next door, if only I'd head in the right direction.",
  "Eine innere Stimme flüstert mir zu, daß unter den drei Tränken jener mein Heil verspricht, der in tiefem Blau leuchtet.": "An inner voice whispers to me that among the three potions, the one that glows deep blue promises my salvation.",
  "Eine innere Stimme flüstert mir zu, ich solle dem Treppenaufgang folgen und ein Stockwerk höher steigen.": "An inner voice whispers to me that I should follow the staircase and climb one floor higher.",
  "Eine innere Stimme flüstert, ich solle den Büchern im Regal mehr Aufmerksamkeit schenken, statt achtlos vorüberzugehen.": "An inner voice whispers that I should pay more attention to the books on the shelf, rather than carelessly walking past.",
  "Eine innere Stimme flüstert: Benutze die Wäscheleine am Ast und knote sie fest an den Ast.": "An inner voice whispers: Use the clothesline on the branch and tie it fast to the branch.",
  "Eine innere Stimme flüstert: Tu einfach irgendetwas, schau zum Beispiel den Gang an — du stürzt ohnehin hinab.": "An inner voice whispers: Just do anything at all, examine the passage for instance — you'll plummet down regardless.",
  "Eine innere Stimme raunt mir zu, dass der Geheimgang ins alte Labor führt, wo lebenswichtige Tränke in ihren Fläschchen auf mich warten.": "An inner voice murmurs to me that the secret passage leads into the old laboratory, where vital potions wait for me in their little flasks.",
  "Eine innere Stimme sagt mir klar und deutlich: Schau ins Geheimfach.": "An inner voice tells me loud and clear: Look in the secret compartment.",
  "Eine kleine zierliche Kiste. Die sieht zerbrechlich aus.": "A small, dainty crate. It looks fragile.",

  "Im Halbdunkel erkenne ich, dass die Kiste längst ein klaffendes Loch hat – nicht der morsche Deckel ist mein Weg, sondern das, was sich in ihrem Inneren verbirgt.": "In the half-dark I see that the crate has long had a gaping hole — the rotten lid isn't my way in, but rather what lies hidden inside it.",

// ===== src/i18n.js =====
// Display-layer internationalization. The game logic, data and parser stay
// German-canonical (see rooms/engine); this module only translates what the
// player SEES. `t(germanString)` returns the German string unchanged when the
// language is German, and the English translation (from MESSAGES) otherwise,
// falling back to the German string if a translation is missing.

const STORE_KEY = "darkcastle.lang";
const listeners = [];
let lang = detectLang();

// German browsers start in German; everyone else starts in English. An explicit
// choice (the in-game switch) is remembered and wins over the browser setting.
function detectLang() {
  try {
    if (typeof localStorage !== "undefined") {
      const saved = localStorage.getItem(STORE_KEY);
      if (saved === "de" || saved === "en") return saved;
    }
  } catch { /* storage may be blocked */ }
  try {
    const nav = (typeof navigator !== "undefined" && navigator.language) || "";
    return nav.toLowerCase().startsWith("de") ? "de" : "en";
  } catch { return "de"; }
}

function getLang() { return lang; }

function setLang(l) {
  if ((l !== "de" && l !== "en") || l === lang) return;
  lang = l;
  try { if (typeof localStorage !== "undefined") localStorage.setItem(STORE_KEY, l); } catch { /* ignore */ }
  for (const cb of listeners) { try { cb(lang); } catch { /* ignore */ } }
}

// Register a callback fired whenever the language changes (used to re-render).
function onLangChange(cb) { listeners.push(cb); }

// Translate one German display string to the current language.
function tr(s) {
  if (lang === "de" || s == null) return s;
  const v = MESSAGES[s];
  return v == null ? s : v;
}

];

// Returns { lines, died } on first matching rule, else null.
function globalCheck(s, cmd) {
  for (const r of RULES) {
    if (r.cmd === cmd && condMet(s, r.if)) {
      const out = [];
      if (r.set) for (const k in r.set) s.flags[k] = r.set[k];
      if (r.give) s.inv[r.give.slot] = r.give.name;
      const arr = Array.isArray(r.say) ? r.say : [r.say];
      for (const line of arr) out.push({ text: line, pen: 7 });
      return { lines: out, died: !!r.die };
    }
  }
  return null;
}


// ===== src/engine.js =====
// Dark Castle engine — DOM-free game logic.
// Mirrors the original AMOS program: inventory slots + flags + per-room rule chains.

const VERSION = "1.0.0";

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
function makeState() {
  const inv = {};
  for (let i = 1; i <= 20; i++) inv[i] = "";
  return {
    raum: "BILD1",
    inv,
    flags: {
      // section / progress
      DURCH: 0, FENSTER2WEG: 0, BRIEFOFFEN: 0, BRIEFGELESEN: 0,
      // safe / living room
      TRESORGEKNACKT: 0, TRESORGESEHEN: 0, T: 0, NOKKK: 0, VERSAGT: 0,
      KOFFERAUF: 0, BUCHGESEHEN: 0, GEDRE: 0, GOLD: 0,
      // 2nd floor
      KISTEGESEHEN: 0, KISTETOTE: 0, SCHISSGESEHEN: 0, SCHEREGESEHEN: 0,
      FASSGESEHEN: 0, SCHRANKOFFEN: 0, SCHRANKGESEHEN: 0, HAMMERGESEHEN: 0,
      WAECHTERTOT: 0,
      // attic / well / finale
      VERHAKT: 0, GEKNOTET: 0, FENSTER: 0, UNIFORM: 0, STARK: 0,
      LOCHGESEHEN: 0, MATTE: 0, BAUMGESEHEN: 0, HUNDGELESEN: 0, KAM: 0,
      DURCHGELESEN: 0, VERSUCH: 0,
      // per-room object visibility flags
      GEGENSTAND1D: 0, GEGENSTAND1E: 0,
      GEGENSTAND2F: 0, GEGENSTAND2G: 0,
      GEGENSTAND4A: 0, GEGENSTAND4B: 0, GEGENSTAND4C: 0, GEGENSTAND4E: 0, GEGENSTAND4F: 0,
      // BILD1 progress markers
      BILD1GENOMMEN: 0, BILD1GEZOGEN: 0, BILD1GESCHAUT: 0,
    },
  };
}

// ---------------------------------------------------------------------------
// Parser: verb + noun(s) -> uppercase command string (e.g. BENUTZESTEINFENSTER)
// ---------------------------------------------------------------------------
function buildCmd(verb, nouns) {
  // Match keys are ASCII (e.g. NIMMSCHLUESSEL). Fold typed umlauts back to ASCII so
  // the player may type either "Schlüssel" or "Schluessel" (ß uppercases to SS already).
  return (verb + nouns.join(""))
    .toUpperCase()
    .replace(/Ä/g, "AE").replace(/Ö/g, "OE").replace(/Ü/g, "UE");
}

// ---------------------------------------------------------------------------
// Conditions
// ---------------------------------------------------------------------------
function hasItem(s, name) {
  return Object.values(s.inv).includes(name);
}

function condMet(s, cond) {
  if (!cond) return true;
  if (Array.isArray(cond)) return cond.every((c) => condMet(s, c));
  if ("hat" in cond && !hasItem(s, cond.hat)) return false;
  if ("nicht" in cond && hasItem(s, cond.nicht)) return false;
  if ("leer" in cond && s.inv[cond.leer] !== "") return false;
  if ("voll" in cond && s.inv[cond.voll] === "") return false;
  if ("slotIst" in cond && s.inv[cond.slotIst.slot] !== cond.slotIst.name) return false;
  if ("flag" in cond && s.flags[cond.flag] !== cond.eq) return false;
  return true;
}

// ---------------------------------------------------------------------------
// Effects (used by both global checks and room rules)
// ---------------------------------------------------------------------------
function applyEffects(s, eff, out) {
  if (eff.say != null) {
    const pen = eff.pen ?? 7;
    const arr = Array.isArray(eff.say) ? eff.say : [eff.say];
    for (const line of arr) out.push({ text: line, pen });
  }
  if (eff.set) for (const k in eff.set) s.flags[k] = eff.set[k];
  if (eff.give) s.inv[eff.give.slot] = eff.give.name;
  if (eff.take != null) {
    const slots = Array.isArray(eff.take) ? eff.take : [eff.take];
    for (const slot of slots) s.inv[slot] = "";
  }
}

// ---------------------------------------------------------------------------
// Generic verb fallbacks (the "Ich kann das nicht ..." chain at room bottom)
// ---------------------------------------------------------------------------
function genericFallback(cmd) {
  const map = [
    ["ZIEHE", "Ich kann das nicht ziehen."],
    ["DRUECKE", "Ich kann das nicht drücken."],
    ["NIMM", "Ich kann das nicht nehmen."],
    ["OEFFNE", "Ich kann das nicht öffnen."],
    ["ISS", "Ich kann das nicht essen."],
    ["TRINK", "Ich kann das nicht trinken."],
    ["SCHAU AN", "Du siehst was,was ich nicht sehe."],
  ];
  for (const [prefix, msg] of map) if (cmd.startsWith(prefix)) return { text: msg, pen: 7 };
  return { text: "Ich kann diese Anweisung leider nicht ausführen.", pen: 7 };
}

// ---------------------------------------------------------------------------
// Room driver
// ---------------------------------------------------------------------------
function lookText(s) {
  return ROOMS[s.raum].look(s);
}

// Currently-visible room objects (the clickable nouns). Filters the room's declared
// `objects` list by the same condMet logic the rules use; returns their display labels.
function visibleObjects(s) {
  const room = ROOMS[s.raum];
  if (!room || !room.objects) return [];
  return room.objects.filter((o) => condMet(s, o.if)).map((o) => o.label);
}

// The current 3-level hint for the player's state: the first not-done step in the
// current room (canonical order, `when`-guards respected), else the room's navigation
// hint. Returns { hints: [s1, s2, s3], cmd }.
function currentHint(s) {
  const empty = ["", "", ""];
  const pending = HINT_STEPS.find(
    (step) => step.room === s.raum
      && (step.when ? condMet(s, step.when) : true)
      && !condMet(s, step.done),
  );
  if (pending) {
    return { cmd: pending.cmd, hints: HINT_TEXTS[`${pending.room}|${pending.cmd}`] || empty };
  }
  const nav = NAV_HINTS[s.raum];
  if (!nav) return { cmd: null, hints: empty };
  const { cmd } = nav(s);
  return { cmd, hints: HINT_TEXTS[`${s.raum}|NAV|${cmd}`] || empty };
}

function enterRoom(s, id) {
  s.raum = id;
  const room = ROOMS[id];
  if (room.onEnter) room.onEnter(s);
  return lookText(s);
}

// Public entry used by main.js / tests when resolving a `call` (code/tresor/ending).
function enterRoomPublic(s, id) {
  return enterRoom(s, id);
}

function emptyResult() {
  return { lines: [], moved: false, died: false, call: null };
}

// Apply a standard data rule's effects; returns a result object.
function runStandardRule(s, rule) {
  const res = emptyResult();
  applyEffects(s, rule, res.lines);
  if (rule.die) { res.died = true; return res; }
  if (rule.call) { res.call = rule.call; return res; }
  if (rule.go) { res.lines.push(...enterRoom(s, rule.go)); res.moved = true; return res; }
  return res;
}

// Normalize a result returned by a rule.fn(s) escape hatch.
function runFnRule(s, rule) {
  const r = rule.fn(s) || {};
  const res = emptyResult();
  if (r.lines) res.lines.push(...r.lines);
  if (r.died) res.died = true;
  if (r.call) res.call = r.call;
  if (r.go) { res.lines.push(...enterRoom(s, r.go)); res.moved = true; }
  return res;
}

function applyCommand(s, cmd) {
  // "Siehe um" re-shows the current room (handled per-room in the original, identical behavior).
  if (cmd === "SIEHE UM") return { lines: lookText(s), moved: false, died: false, call: null };

  // 1) room rules, first match wins (original order: room rules BEFORE global checks)
  const room = ROOMS[s.raum];
  for (const rule of room.rules) {
    const matches = rule.any ? cmd !== "" : rule.cmd === cmd;
    if (matches && condMet(s, rule.if)) {
      return rule.fn ? runFnRule(s, rule) : runStandardRule(s, rule);
    }
  }

  // 2) global checks (ALLGEMEINEFRAGEN)
  const g = globalCheck(s, cmd);
  if (g) return { lines: g.lines, moved: false, died: g.died, call: null };

  // 3) generic fallback
  return { lines: [genericFallback(cmd)], moved: false, died: false, call: null };
}


// ===== src/specials.js =====
// Special modules: safe-cracking minigame logic + section-code entry.
// DOM-free; the UI layer (ui.js/main.js) drives presentation around these.

// ---------------------------------------------------------------------------
// TRESORKNACK — safe-cracking minigame logic core (source 547-639).
// 6 digits (1..9), each position cycles 0..9 with "left"; "right" moves position.
// rng() returns an integer 0..9 (caller injects; engine forbids Math.random()).
// ---------------------------------------------------------------------------
function makeTresor(rng) {
  const target = Array.from({ length: 6 }, () => {
    let d = 0;
    while (d === 0) d = rng(); // original rerolls zeros (FEHLER loop)
    return d;
  });
  const cur = [0, 0, 0, 0, 0, 0];
  let pos = 0;
  return {
    target,
    cur,
    get pos() { return pos; },
    left() { cur[pos] = (cur[pos] + 1) % 10; },
    right() { pos = (pos + 1) % 6; },
    check() { return cur.every((d, i) => d === target[i]); },
  };
}

// ---------------------------------------------------------------------------
// Section codes (CODE procedure, source 355-367 + PASSWORT1/2/3 14-48).
// Returns { state, code } with the proper start inventory + room, or null.
// ---------------------------------------------------------------------------
function applyCode(code) {
  const C = String(code).toUpperCase();
  const s = makeState();
  if (C === "STOERTEBECKER") { passwort1(s); s.raum = "BILD3"; return { state: s, code: 1 }; }
  if (C === "DT 64") { passwort2(s); s.raum = "BILD6"; return { state: s, code: 2 }; }
  if (C === "ANARCHY") { passwort3(s); s.flags.DURCH = 1; s.raum = "BILD2"; return { state: s, code: 3 }; }
  if (C === "AMIGA") { return { ending: true, code: "ending" }; } // cheat: straight to the credits
  if (C === "AMOS") { // cheat: straight to the safe minigame, in a coherent living-room state
    passwort1(s);
    s.inv[6] = "Stetoskop";
    Object.assign(s.flags, {
      BRIEFOFFEN: 1, BRIEFGELESEN: 1, GEGENSTAND4B: 1, KOFFERAUF: 1,
      GEDRE: 1, GEGENSTAND4E: 1, TRESORGESEHEN: 1, GEGENSTAND4F: 1,
    });
    s.raum = "BILD4";
    return { state: s, tresor: true, code: "tresor" };
  }
  return null;
}

function passwort1(s) {
  Object.assign(s.inv, { 1: "Schluessel", 2: "Brief", 3: "Frucht", 4: "Ast", 5: "Stein" });
}
function passwort2(s) {
  passwort1(s);
  Object.assign(s.inv, { 6: "Stetoskop", 7: "Goldschluessel", 8: "Blauer Trank", 9: "Gruener Trank", 10: "Roter Trank" });
}
function passwort3(s) {
  // FIXED: original PASSWORT3 had typo INVETRAR1$ so slot 1 (Schluessel) was lost.
  Object.assign(s.inv, {
    1: "Schluessel", 2: "Brief", 3: "Frucht", 4: "Ast", 5: "Stein",
    6: "Stetoskop", 7: "Goldschluessel", 8: "Blauer Trank", 9: "Gruener Trank", 10: "Roter Trank",
    11: "Hammer", 12: "Krug", 13: "Drahtschere", 14: "Uniform",
  });
}


// ===== src/ui.js =====
// DOM/presentation layer for the Amiga-style two-screen UI. Browser-only.
// All gameplay logic lives in engine.js; this module only renders + collects input.
// Everything the player sees is run through tr() so the UI can switch DE/EN live.

const PEN = (n) => `var(--pen${n})`;

// The 12 verbs of the lower menu, laid out as in the original UBERSCHREIBE proc.
const VERB_LAYOUT = [
  ["Siehe um", "Ziehe"],
  ["Drücke", "Benutze"],
  ["Öffne", "Gib"],
  ["Schau an", "Nimm"],
  ["Trink", "Iss"],
];
const VERB_EXTRA = ["Inventar", "Information"];

function createUI(root) {
  const elText = root.querySelector("#text");
  const elBild = root.querySelector("#bild");
  const elMenu = root.querySelector("#screen2");

  // --- live language switching -------------------------------------------
  // The German lines of the current print-based screen, so they can be re-rendered
  // in the new language without the caller re-issuing them. Custom screens
  // (intro/credits/tresor/splash) own #text directly and opt out of this.
  let screenLines = [];
  let customText = false;     // true while a non-print screen owns #text
  let rebuildControls = null; // re-renders the active #screen2 control in the new language
  let bildLabel = "";         // German room label currently in the picture box
  let helpBtnEl = null;       // corner help button, relabelled on switch

  function renderLine(l) {
    const div = document.createElement("div");
    if (!l.text || l.text.trim() === "") {
      div.className = "blank";
    } else {
      div.className = "ln";
      div.textContent = tr(l.text);
      div.style.color = PEN(l.pen ?? 7);
    }
    elText.appendChild(div);
  }

  function print(lines) {
    customText = false;
    for (const l of lines) { screenLines.push(l); renderLine(l); }
    elText.scrollTop = elText.scrollHeight;
  }

  function clear() { elText.innerHTML = ""; screenLines = []; customText = false; }

  function setBild(label) {
    bildLabel = label || "";
    elBild.style.display = ""; // restore the picture box (intro/menu may have hidden it)
    elBild.innerHTML = "";
    elBild.textContent = tr(bildLabel);
  }

  function controls(node) {
    elMenu.innerHTML = "";
    elMenu.appendChild(node);
  }

  // Register (and immediately run) the builder for the current #screen2 control, so a
  // language switch can rebuild it with translated labels but the SAME resolve closure.
  function setControls(build) { rebuildControls = build; build(); }

  function button(label, onClick, cls = "btn") {
    const b = document.createElement("button");
    b.className = cls;
    b.textContent = tr(label);
    b.addEventListener("click", onClick);
    return b;
  }

  // Re-render the current screen when the language changes.
  onLangChange(() => {
    if (!customText) {
      const saved = screenLines;
      screenLines = [];
      elText.innerHTML = "";
      for (const l of saved) { screenLines.push(l); renderLine(l); }
    }
    if (rebuildControls) rebuildControls();
    if (bildLabel) elBild.textContent = tr(bildLabel);
    if (helpBtnEl) { helpBtnEl.textContent = tr("❓ Hilfe"); helpBtnEl.title = tr("Hilfe — Tipp zum nächsten Schritt"); }
  });

  // Render the verb menu + movement cross; resolve with the chosen action.
  // -> { type:"verb", verb } | { type:"dir", dir } | { type:"special", name }
  function pickAction() {
    return new Promise((resolve) => setControls(() => {
      const grid = document.createElement("div");
      grid.className = "verbgrid";

      const col1 = document.createElement("div"); col1.className = "verbcol";
      const col2 = document.createElement("div"); col2.className = "verbcol";
      for (const [a, b] of VERB_LAYOUT) {
        col1.appendChild(button(a, () => resolve({ type: "verb", verb: a })));
        col2.appendChild(button(b, () => resolve({ type: "verb", verb: b })));
      }
      // extra column items (Inventar/Information) appended to col2 area via a third stack
      const col3 = document.createElement("div"); col3.className = "verbcol";
      for (const name of VERB_EXTRA) {
        col3.appendChild(button(name, () => resolve({ type: "special", name })));
      }
      const cross = document.createElement("div"); cross.className = "cross";
      const mk = (label, cls, dir) => button(label, () => resolve({ type: "dir", dir }), "btn " + cls);
      const mid = document.createElement("div"); mid.className = "btn mid";
      cross.appendChild(mk("V", "v", "V"));
      cross.appendChild(mk("L", "l", "L"));
      cross.appendChild(mid);
      cross.appendChild(mk("R", "r", "R"));
      cross.appendChild(mk("H", "h", "H"));

      const right = document.createElement("div"); right.className = "verbcol";
      right.appendChild(col3);
      right.appendChild(cross);

      grid.appendChild(col1);
      grid.appendChild(col2);
      grid.appendChild(right);
      controls(grid);
    }));
  }

  // Ask for a single noun via a text field. Resolves with the trimmed string.
  function ask(promptText) {
    return new Promise((resolve) => {
      let val = "";
      setControls(() => {
        const wrap = document.createElement("form");
        wrap.className = "prompt";
        const label = document.createElement("label");
        label.textContent = tr(promptText);
        const input = document.createElement("input");
        input.autocomplete = "off"; input.autocapitalize = "off"; input.spellcheck = false;
        input.value = val;
        input.addEventListener("input", () => { val = input.value; });
        wrap.appendChild(label); wrap.appendChild(input);
        wrap.addEventListener("submit", (e) => { e.preventDefault(); resolve(input.value.trim()); });
        controls(wrap);
        input.focus();
      });
    });
  }

  // Yes/No question answered by clicking Ja/Nein (or pressing J/N). Resolves a boolean.
  function confirm(promptText, { yes = "Ja", no = "Nein" } = {}) {
    return new Promise((resolve) => {
      if (promptText) print([{ text: promptText, pen: 2 }]);
      const finish = (val) => { window.removeEventListener("keydown", onKey); resolve(val); };
      const onKey = (e) => {
        const k = e.key.toLowerCase();
        if (k === "j" || k === "y") { e.preventDefault(); finish(true); }
        else if (k === "n") { e.preventDefault(); finish(false); }
      };
      window.addEventListener("keydown", onKey);
      setControls(() => {
        const wrap = document.createElement("div"); wrap.className = "actions";
        wrap.appendChild(button(yes, () => finish(true)));
        wrap.appendChild(button(no, () => finish(false)));
        controls(wrap);
      });
    });
  }

  // Pick a noun by clicking instead of typing. Renders the visible room objects and the
  // inventory as two groups of buttons. Resolves with the chosen label, or null on cancel.
  function pickNoun({ title, objects = [], inventory = [] }) {
    return new Promise((resolve) => setControls(() => {
      const wrap = document.createElement("div"); wrap.className = "nounpick";
      if (title) {
        const titleEl = document.createElement("div"); titleEl.className = "nountitle"; titleEl.textContent = tr(title);
        wrap.appendChild(titleEl);
      }
      const group = (heading, items) => {
        if (!items.length) return;
        const h = document.createElement("div"); h.className = "noungroup"; h.textContent = tr(heading);
        const row = document.createElement("div"); row.className = "nounrow";
        // buttons display the translated label but resolve the original German token (parser stays German)
        for (const label of items) row.appendChild(button(label, () => resolve(label)));
        wrap.appendChild(h); wrap.appendChild(row);
      };
      group("Im Raum", objects);
      group("Inventar", inventory);
      if (!objects.length && !inventory.length) {
        const none = document.createElement("div"); none.className = "noungroup";
        none.textContent = tr("Hier gibt es nichts."); wrap.appendChild(none);
      }
      wrap.appendChild(button("Abbrechen", () => resolve(null), "btn cancel"));
      controls(wrap);
    }));
  }

  // Wait for a click / key / SPACE to continue.
  function pressToContinue(label = "Weiter") {
    return new Promise((resolve) => {
      const done = () => { window.removeEventListener("keydown", onKey); resolve(); };
      const onKey = (e) => { if (e.key === " " || e.key === "Enter") { e.preventDefault(); done(); } };
      window.addEventListener("keydown", onKey);
      setControls(() => {
        const wrap = document.createElement("div"); wrap.className = "actions";
        wrap.appendChild(button(label, done));
        controls(wrap);
      });
    });
  }

  // Main menu: title + numbered options. Resolves with 1..n.
  function menu(title, items, { image } = {}) {
    return new Promise((resolve) => {
      const onKey = (e) => {
        const n = parseInt(e.key, 10);
        if (n >= 1 && n <= items.length) { window.removeEventListener("keydown", onKey); resolve(n); }
      };
      window.addEventListener("keydown", onKey);
      setControls(() => {
        clear();
        customText = true; // the menu owns #text (picture + title); opt out of generic re-render
        if (image) {
          // Show the castle picture big above the title (the picture box is hidden).
          elBild.style.display = "none";
          const host = document.createElement("div"); host.className = "intro";
          const pic = document.createElement("img"); pic.className = "intro-pic"; pic.src = image; pic.alt = "Dark Castle";
          const titleEl = document.createElement("div"); titleEl.className = "title"; titleEl.textContent = tr(title);
          host.appendChild(pic); host.appendChild(titleEl);
          elText.appendChild(host);
        } else {
          const titleEl = document.createElement("div"); titleEl.className = "title"; titleEl.textContent = tr(title);
          elText.appendChild(titleEl);
        }
        const list = document.createElement("div"); list.className = "menu-list actions"; list.style.flexDirection = "column";
        items.forEach((label, i) => {
          list.appendChild(button(label, () => { window.removeEventListener("keydown", onKey); resolve(i + 1); }));
        });
        controls(list);
      });
    });
  }

  // Full-screen text page (manual, backstory, info). Resolves on continue.
  async function page(lines, { title } = {}) {
    clear();
    if (title) print([{ text: title, pen: 12 }, { text: "", pen: 7 }]);
    print(lines.map((t) => (typeof t === "string" ? { text: t, pen: 7 } : t)));
    await pressToContinue("S P A C E");
  }

  // Vertical auto-scroll for the ending credits. With `image`, the original layout is
  // reproduced: the picture stays fixed on top and the text scrolls only in the band
  // below it (clipped, so it never rises over the picture). Loops from the start when
  // it finishes; Click/Space/Überspringen skips (resolves). Slow, readable pace.
  function scrollText(lines, { title, image } = {}) {
    return new Promise((resolve) => {
      clear();
      customText = true; rebuildControls = null; // animated credits own #text; no live rebuild
      let clip = elText; // the element that bounds + clips the scroll (full screen by default)
      if (image) {
        elBild.style.display = "none"; // the big sunset replaces the small picture box
        const host = document.createElement("div"); host.className = "endscreen";
        const pic = document.createElement("img"); pic.className = "end-pic"; pic.src = image; pic.alt = "";
        host.appendChild(pic);
        clip = document.createElement("div"); clip.className = "end-clip";
        host.appendChild(clip);
        elText.appendChild(host);
      }
      const inner = document.createElement("div");
      if (image) inner.className = "end-scroll";
      if (title) {
        const titleEl = document.createElement("div"); titleEl.className = "title"; titleEl.textContent = tr(title);
        inner.appendChild(titleEl);
      }
      for (const ln of lines) {
        const d = document.createElement("div");
        d.className = ln.trim() === "" ? "blank" : "ln center";
        d.textContent = tr(ln);
        inner.appendChild(d);
      }
      clip.appendChild(inner);
      // Start the credits part-way up the band instead of fully below it, so the text
      // shows up sooner rather than scrolling all the way in from the bottom first.
      const lead = Math.round(clip.clientHeight * 0.45);
      inner.style.transform = `translateY(${lead}px)`;
      let y = lead;
      let raf = 0;
      const end = inner.scrollHeight;
      const finish = () => { cancelAnimationFrame(raf); window.removeEventListener("keydown", onKey); elBild.style.display = ""; resolve(); };
      const onKey = (e) => { if (e.key === " " || e.key === "Enter") finish(); };
      window.addEventListener("keydown", onKey);
      const tick = () => {
        y -= 0.35; // slow, readable pace
        inner.style.transform = `translateY(${y}px)`;
        if (y < -end) y = lead; // loop with the same short lead-in
        raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
      const skip = button("Überspringen", finish);
      const wrap = document.createElement("div"); wrap.className = "actions";
      wrap.appendChild(skip);
      controls(wrap);
    });
  }

  // Horizontal infinite ticker for the intro (matches the original AMOS marquee:
  // Def Scroll ... -2,0 looping forever). Two copies of the text scroll right-to-left;
  // when the first has fully passed we shift by one copy width, so the text flows
  // seamlessly from its end straight back into its start. Space/Enter/skip resolves.
  function marquee(text, { image } = {}) {
    return new Promise((resolve) => {
      clear();
      customText = true; rebuildControls = null; // animated ticker owns #text (text is pre-translated by the caller)
      const host = document.createElement("div");
      host.className = "intro";
      if (image) {
        // Big picture on top, ticker band at the bottom (as in the original). The
        // small picture box above is hidden for the intro and restored afterwards.
        elBild.style.display = "none";
        const pic = document.createElement("img");
        pic.className = "intro-pic";
        pic.src = image;
        pic.alt = "Dark Castle";
        host.appendChild(pic);
      }
      const clip = document.createElement("div"); clip.className = "marquee-clip";
      const lane = document.createElement("div"); lane.className = "marquee-lane";
      const mk = () => { const d = document.createElement("div"); d.className = "marquee-item"; d.textContent = text; return d; };
      const a = mk();
      lane.appendChild(a);
      lane.appendChild(mk());
      clip.appendChild(lane);
      host.appendChild(clip);
      elText.innerHTML = "";
      elText.appendChild(host);

      let x = clip.clientWidth || elText.clientWidth || 320; // start just off the right edge
      const oneW = a.scrollWidth || 1; // width of one copy incl. trailing gap (padding)
      const speed = 1.0; // px per frame
      let raf = 0;
      const finish = () => {
        cancelAnimationFrame(raf);
        window.removeEventListener("keydown", onKey);
        elBild.style.display = "";
        resolve();
      };
      const onKey = (e) => { if (e.key === " " || e.key === "Enter") { e.preventDefault(); finish(); } };
      window.addEventListener("keydown", onKey);
      const tick = () => {
        x -= speed;
        if (x <= -oneW) x += oneW; // seamless wrap: the second copy takes over
        lane.style.transform = `translateX(${x}px)`;
        raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
      const wrap = document.createElement("div"); wrap.className = "actions";
      wrap.appendChild(button("Überspringen", finish));
      controls(wrap);
    });
  }

  // Full-screen picture with an optional caption + continue control. Used for the
  // pre-intro "THE NEW STYLE" splash (autoMs auto-advances) and the death screen.
  function imageScreen(src, { lines = [], pen = 4, label = "Weiter", autoMs = 0, fade = 0, smooth = false } = {}) {
    return new Promise((resolve) => {
      clear();
      customText = true; rebuildControls = null; // full-screen picture owns #text
      elBild.style.display = "none";
      const host = document.createElement("div"); host.className = "intro";
      const pic = document.createElement("img"); pic.className = "intro-pic"; pic.src = src; pic.alt = "";
      if (smooth) pic.style.imageRendering = "auto"; // high-res logo: scale smoothly, not nearest-neighbour
      host.appendChild(pic);
      if (lines.length) {
        const box = document.createElement("div"); box.className = "intro-text";
        for (const ln of lines) {
          const d = document.createElement("div");
          d.className = ln.trim() === "" ? "blank" : "ln center";
          d.textContent = tr(ln);
          d.style.color = PEN(pen);
          box.appendChild(d);
        }
        host.appendChild(box);
      }
      elText.appendChild(host);

      let timer = 0;
      let done = false;
      const delay = (ms) => new Promise((r) => setTimeout(r, ms));
      const finish = async () => {
        if (done) return; done = true;
        if (timer) clearTimeout(timer);
        window.removeEventListener("keydown", onKey);
        if (fade > 0) {
          // Crossfade through black (like the original "Fade 4"): cover the screen,
          // hand off so the next view renders underneath, then reveal it.
          const ov = document.createElement("div");
          ov.className = "fade-black";
          ov.style.transition = `opacity ${fade}ms linear`;
          ov.style.opacity = "0";
          document.body.appendChild(ov);
          void ov.offsetWidth; // force a reflow so opacity:0 is committed before the change below
          ov.style.opacity = "1"; // now this transitions (fades the logo to black)
          await delay(fade);
          elBild.style.display = "";
          resolve();
          await delay(30); // let the next screen paint behind the black cover
          ov.style.opacity = "0";
          await delay(fade);
          ov.remove();
        } else {
          elBild.style.display = "";
          resolve();
        }
      };
      const onKey = (e) => { if (e.key === " " || e.key === "Enter") { e.preventDefault(); finish(); } };
      window.addEventListener("keydown", onKey);
      const bar = document.createElement("div"); bar.className = "actions";
      bar.appendChild(button(label, finish));
      controls(bar);
      if (autoMs > 0) timer = setTimeout(finish, autoMs);
    });
  }

  // Safe-cracking minigame UI driven by a tresor object (from makeTresor).
  // Resolves true on success, false on failure/timeout.
  function tresor(t, { seconds = 45 } = {}) {
    return new Promise((resolve) => {
      const audio = makeBeep();

      // The actual minigame. The countdown only starts here — i.e. after the player has
      // read the notice and clicked to begin — so adjusting the volume costs no time.
      const startGame = () => {
        clear();
        print([
          { text: "Drücke -Links- und achte auf das Geräusch (Glocke = richtige Ziffer).", pen: 7 },
          { text: "Mit -Position- wählst du die Stelle. Mit -Öffnen- prüfst du den Code.", pen: 7 },
        ]);
        customText = true; rebuildControls = null; // minigame owns #text; no live rebuild mid-crack
        const dwrap = document.createElement("div");
        const digits = document.createElement("div"); digits.className = "tresor-digits";
        const marker = document.createElement("div"); marker.className = "tresor-pos";
        const timeEl = document.createElement("div"); timeEl.className = "tresor-time";
        dwrap.appendChild(digits); dwrap.appendChild(marker); dwrap.appendChild(timeEl);

        let timeLeft = seconds;
        const render = () => {
          digits.textContent = t.cur.join(" ");
          marker.textContent = t.cur.map((_, i) => (i === t.pos ? "^" : " ")).join(" ");
          timeEl.textContent = tr("Zeit: ") + timeLeft;
        };
        const finish = (win) => { clearInterval(iv); window.removeEventListener("keydown", onKey); resolve(win); };
        const left = () => { t.left(); if (t.cur[t.pos] === t.target[t.pos]) audio(880); else audio(220); render(); };
        const right = () => { t.right(); render(); };
        const open = () => finish(t.check());

        const onKey = (e) => {
          if (e.key === "ArrowUp" || e.key.toLowerCase() === "l") left();
          else if (e.key === "ArrowRight" || e.key.toLowerCase() === "p") right();
          else if (e.key === " ") { e.preventDefault(); open(); }
        };
        window.addEventListener("keydown", onKey);

        const bar = document.createElement("div"); bar.className = "actions";
        bar.appendChild(button("Links (zählen)", left));
        bar.appendChild(button("Position", right));
        bar.appendChild(button("Öffnen", open));
        controls(bar);

        const host = document.createElement("div");
        host.appendChild(dwrap);
        elText.appendChild(host);
        render();

        const iv = setInterval(() => {
          timeLeft -= 1; render();
          if (timeLeft <= 0) finish(false);
        }, 1000);
      };

      // Pre-game notice: the safe is cracked BY EAR, so the sound must be on.
      clear();
      print([
        { text: "Du machst dich an den Tresor.", pen: 2 },
        { text: "WICHTIG: Schalte den Ton ein! Du knackst ihn nach Gehör —", pen: 4 },
        { text: "eine Glocke verrät die richtige Ziffer.", pen: 4 },
        { text: tr("Die Zeit (%d Sek.) läuft erst los, wenn du startest.").replace("%d", seconds), pen: 7 },
      ]);
      customText = true; rebuildControls = null; // notice screen; language applies on re-entry
      const startBar = document.createElement("div"); startBar.className = "actions";
      startBar.appendChild(button("Tresor angehen", startGame));
      controls(startBar);
    });
  }

  // Corner help button (mounted once). getHints() -> { hints:[s1,s2,s3] }.
  function helpButton(getHints) {
    const b = document.createElement("button");
    b.className = "help-btn";
    b.textContent = tr("❓ Hilfe");
    b.title = tr("Hilfe — Tipp zum nächsten Schritt");
    helpBtnEl = b; // so the language switch can relabel it
    b.addEventListener("click", () => helpOverlay(getHints().hints));
    root.appendChild(b);
    return { show() { b.style.display = ""; }, hide() { b.style.display = "none"; } };
  }

  // Dream overlay with escalating levels (1 -> 2 -> 3) + Mehr Hilfe / Schließen.
  function helpOverlay(hints) {
    let level = 0;
    const ov = document.createElement("div"); ov.className = "help-overlay";
    const box = document.createElement("div"); box.className = "help-box";
    const text = document.createElement("div"); text.className = "help-text";
    const bar = document.createElement("div"); bar.className = "actions";
    const more = button("Mehr Hilfe", () => { if (level < 2) { level += 1; render(); } });
    const close = button("Schließen", () => ov.remove());
    const render = () => {
      text.textContent = tr((hints && hints[level]) || "Dazu fällt mir gerade kein Rat ein.");
      more.style.display = (hints && level < 2 && hints[level + 1]) ? "" : "none";
    };
    bar.appendChild(more); bar.appendChild(close);
    box.appendChild(text); box.appendChild(bar);
    ov.appendChild(box); root.appendChild(ov);
    ov.addEventListener("click", (e) => { if (e.target === ov) ov.remove(); });
    render();
  }

  return { print, clear, setBild, pickAction, ask, confirm, pickNoun, pressToContinue, menu, page, scrollText, marquee, imageScreen, tresor, helpButton };
}

// Tiny WebAudio beep for the safe (high pitch = right digit, low = wrong).
function makeBeep() {
  let ctx = null;
  return (freq) => {
    try {
      ctx = ctx || new (window.AudioContext || window.webkitAudioContext)();
      const play = () => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type = "square"; o.frequency.value = freq;
        const t0 = ctx.currentTime;
        // Audible level with a quick attack/decay envelope (the old 0.04/60ms blip was
        // far too quiet+short to notice). Times are read at play time, after any resume.
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.25, t0 + 0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.2);
        o.connect(g); g.connect(ctx.destination);
        o.start(t0); o.stop(t0 + 0.22);
      };
      // Normally the context is already "running" when created in a click; resume() is a
      // safety net, and we only schedule the tone once it's running (no suspended-start race).
      if (ctx.state === "suspended" && ctx.resume) ctx.resume().then(play).catch(() => {});
      else play();
    } catch { /* audio optional */ }
  };
}


// ===== src/audio.js =====
// Background music playback for the web port. Plays the original songs (converted
// AMOS music banks, rendered to MP3 in assets/audio/). Browser-only; degrades to a
// no-op where the Audio element is unavailable (e.g. the fake-DOM smoke test).
//
// Faithful mapping (see EINLEITUNG in the AMOS source: "Music Off" when the intro
// ends): title music plays only during the intro, then silence in menu/gameplay;
// the death and ending screens get their own songs.

const TRACKS = { intro: "titel.mp3", death: "tot.mp3", ending: "end.mp3" };

function createAudio(basePath = "assets/audio/") {
  const supported = typeof Audio !== "undefined";
  let el = null; // the single <audio> element in use
  let wantFile = null; // track that should be playing once unlocked / unmuted
  let muted = false;

  function load(file) {
    if (el && el._file === file) return el;
    if (el) try { el.pause(); } catch {}
    el = new Audio(basePath + file);
    el._file = file;
    el.loop = true;
    el.volume = 0.6;
    return el;
  }
  function tryPlay() {
    if (!supported || muted || !wantFile) return;
    const a = load(wantFile);
    // .play() may reject until the page has had a user gesture (autoplay policy).
    if (a && a.play) Promise.resolve(a.play()).catch(() => {});
  }

  function play(key) {
    wantFile = TRACKS[key] || null;
    if (!wantFile) return stop();
    tryPlay();
  }
  function stop() {
    wantFile = null;
    if (el) try { el.pause(); el.currentTime = 0; } catch {}
  }
  function setMuted(m) {
    muted = m;
    if (muted) { if (el) try { el.pause(); } catch {} }
    else tryPlay();
  }

  // Start any pending track on the first user gesture (autoplay unlock).
  if (supported && typeof window !== "undefined" && window.addEventListener) {
    const unlock = () => tryPlay();
    window.addEventListener("pointerdown", unlock);
    window.addEventListener("keydown", unlock);
  }

  return { play, stop, setMuted, isMuted: () => muted, supported };
}


// ===== src/main.js =====
// Runtime: wires engine + ui + specials into the menu/intro/game/ending flow.

const ROOM_LABELS = {
  BILD1: "Vor dem Haus", BILD2: "Hinter dem Haus", BILD3: "Kleiner Raum",
  BILD4: "Wohnzimmer", BILD5: "Geheimlabor", BILD6: "Flur (2. Stock)",
  BILD7: "Küche", BILD8: "Abstellraum", BILD9: "Treppe / Wächter",
  BILD10: "Dachboden", BILD11: "Im Gang", BILD12: "Dunkler Gang", BILD13: "Agathes Zelle",
};

const VERB_PROMPTS = {
  "Öffne": ["Was soll ich öffnen ? : "],
  "Ziehe": ["Was soll ich ziehen ? : "],
  "Nimm": ["Was soll ich nehmen ? : "],
  "Drücke": ["Was soll ich drücken ? : "],
  "Trink": ["Was soll ich trinken ? : "],
  "Iss": ["Was soll ich essen ? : "],
  "Benutze": ["Was soll ich benutzen ? : ", "Mit was soll ich das benutzen ? : "],
  "Schau an": ["Worauf soll ich schauen ? : "],
  "Gib": ["Was soll ich geben ? : ", "An wen soll ich das geben ? : "],
};

let ui;
let audio;
let help = null;          // corner help button (mounted in boot, shown only during play)
let activeState = null;   // the live game state, so the help button can read currentHint

async function boot(root) {
  ui = createUI(root);
  audio = createAudio();
  addMuteButton(root);
  const langSwitch = addLangSwitch(root);
  help = ui.helpButton(() => currentHint(activeState));
  // The language switch is shown only OUTSIDE the actual game — i.e. exactly when the
  // help button is hidden. Tie its visibility to the inverse of the help button's.
  const showHelp = help.show, hideHelp = help.hide;
  help = {
    show: () => { showHelp(); langSwitch.hide(); },
    hide: () => { hideHelp(); langSwitch.show(); },
  };
  help.hide(); // only visible during play(); the switch is shown everywhere else
  audio.play("intro"); // queue title music; the splash click below unlocks audio
  // The "THE NEW STYLE presents" splash waits for a click/Space — that first gesture
  // satisfies the browser autoplay policy, so the title music then plays through the
  // intro. (Sound cannot start on bare page load without a user interaction.)
  await ui.imageScreen("assets/newstyle.png", { fade: 600, smooth: true, label: "Klick zum Starten" });
  // Horizontal, infinitely-looping marquee (as in the original AMOS intro). Runs until
  // the player presses Space/skips, then we continue to the menu.
  await ui.marquee(TEXTS.intro.map((l) => tr(l)).join("        "), { image: "assets/castle.png" });
  audio.stop();
  while (true) {
    help.hide(); // hidden on intro/menu; play() shows it
    const choice = await ui.menu(TEXTS.menu.title, [
      "1 — Anleitung", "2 — Vorgeschichte", "3 — Code eingeben", "4 — Neu beginnen",
    ], { image: "assets/castle.png" });
    if (choice === 1) await anleitung();
    else if (choice === 2) await vorgeschichte();
    else if (choice === 3) await codeEntry();
    else if (choice === 4) await play(makeState());
  }
}

async function anleitung() {
  ui.clear();
  ui.print([{ text: "A n l e i t u n g", pen: 12 }, { text: "", pen: 7 }]);
  const read = await ui.confirm("Haben sie die Vorgeschichte schon gelesen ?");
  if (!read) {
    ui.print([{ text: "Lesen sie erst die Vorgeschichte!", pen: 4 }]);
    await ui.pressToContinue();
    return;
  }
  await ui.page(TEXTS.manualP1, { title: "A n l e i t u n g" });
  await ui.page(TEXTS.manualP2, { title: "A n l e i t u n g" });
}

async function vorgeschichte() {
  await ui.page(TEXTS.backstoryP1, { title: "V o r g e s c h i c h t e" });
  await ui.page(TEXTS.backstoryP2, { title: "V o r g e s c h i c h t e" });
}

async function codeEntry() {
  ui.clear();
  const code = await ui.ask("Bitte geben sie das Codewort ein. : ");
  const res = applyCode(code);
  if (!res) {
    ui.print([{ text: "Passwort Fehler !", pen: 4 }]);
    await ui.pressToContinue();
    return;
  }
  if (res.ending) { await ending(); return; } // "AMIGA" jumps straight to the credits
  if (res.tresor) { await tresorGame(res.state); return; } // "AMOS" jumps straight to the safe minigame
  await play(res.state);
}

// Launch the safe-cracking minigame directly (used by the "AMOS" code), then drop into
// normal play in the living room — or into the death sequence if the crack failed.
async function tresorGame(state) {
  activeState = state;
  ui.clear();
  ui.setBild(ROOM_LABELS[state.raum]);
  const sub = await handleCall(state, "tresor");
  if (sub && sub.died) { await deathSequence(); return; }
  await play(state);
}

// Show a fresh screen: clear the text area, print the lines, then the "Was nun ?" prompt.
// Each action replaces the screen, so only the current text is ever shown (no scrolling).
function showScreen(lines) {
  ui.clear();
  ui.print(lines);
  ui.print([{ text: "", pen: 7 }, { text: "Was nun ?", pen: 2 }]);
}

async function play(state) {
  audio.stop(); // gameplay is silent; title music only plays on the title screen
  activeState = state; // expose to the help button
  help.show();
  ui.setBild(ROOM_LABELS[state.raum]);
  showScreen(enterRoomPublic(state, state.raum)); // initial look (runs onEnter)

  while (true) {
    ui.setBild(ROOM_LABELS[state.raum]);
    const action = await ui.pickAction();

    if (action.type === "special" && action.name === "Inventar") { showScreen(inventarLines(state)); continue; }
    if (action.type === "special" && action.name === "Information") { showScreen(infoLines()); continue; }

    let cmd;
    if (action.type === "dir") {
      cmd = action.dir;
    } else if (action.verb === "Siehe um") {
      cmd = "SIEHE UM";
    } else {
      const prompts = VERB_PROMPTS[action.verb] || [];
      const nouns = [];
      let abort = false;
      for (const p of prompts) {
        const chosen = await ui.pickNoun({
          title: p,
          objects: visibleObjects(state),
          inventory: inventoryNouns(state),
        });
        if (chosen == null) { abort = true; break; }
        nouns.push(chosen);
      }
      if (abort) continue; // keep the current screen; the player just picks again
      cmd = buildCmd(action.verb, nouns);
    }

    const r = applyCommand(state, cmd);

    if (r.died) { ui.clear(); ui.print(r.lines); await deathSequence(); return; }
    if (r.call === "ending") { ui.clear(); ui.print(r.lines); await ending(); return; }
    if (r.call) {
      ui.clear(); ui.print(r.lines);
      const sub = await handleCall(state, r.call);
      if (sub && sub.died) { await deathSequence(); return; }
      ui.print([{ text: "", pen: 7 }, { text: "Was nun ?", pen: 2 }]);
      continue;
    }

    showScreen(r.lines); // normal command: clear, show the result, re-prompt
  }
}

async function handleCall(state, call) {
  if (call === "code1") { await ui.pressToContinue("Bitte klicken."); ui.clear(); ui.print(enterRoomPublic(state, "BILD3")); }
  else if (call === "code2") { await ui.pressToContinue("Bitte klicken."); ui.clear(); ui.print(enterRoomPublic(state, "BILD6")); }
  else if (call === "code3") {
    ui.print([{ text: "", pen: 7 }, { text: "Der Code für den nächsten Teil lautet : ANARCHY", pen: 5 }]);
    await ui.pressToContinue("Bitte klicken.");
    ui.clear(); ui.print(enterRoomPublic(state, "BILD2"));
  } else if (call === "tresor") {
    const t = makeTresor(() => Math.floor(Math.random() * 10));
    help.hide(); // no help during the minigame
    const win = await ui.tresor(t);
    ui.clear();
    if (win) {
      help.show();
      // Show the success right away. (The original deferred "Es gelang mir, den Tresor
      // zu öffnen." to the player's next action, so it felt like nothing happened.)
      // Reuse the engine's post-crack rule so that text stays in one place.
      state.flags.TRESORGEKNACKT = 1;
      const opened = applyCommand(state, "__GEKNACKT__");
      ui.print(opened.lines);
      ui.print(enterRoomPublic(state, "BILD4"));
    } else {
      // Failed crack: the explosive trap detonates right away. (The original deferred
      // the blast to the player's next action.) Setting VERSAGT makes BILD4's any-rule
      // yield the explosion text + death, so we reuse it as the single source here.
      state.flags.VERSAGT = 1;
      const boom = applyCommand(state, "__VERSAGT__");
      ui.print(boom.lines);
      return { died: boom.died };
    }
  }
}

// Inventory state values stay ASCII (matching/logic), but display them with umlauts.
const ITEM_DISPLAY = {
  "Schluessel": "Schlüssel",
  "Goldschluessel": "Goldschlüssel",
  "Gruener Trank": "Grüner Trank",
  "Waescheleine": "Wäscheleine",
  "Waescheleinenast": "Wäscheleinenast",
};

// Inventory items as clickable nouns (display names). Used by the click-to-pick input.
function inventoryNouns(state) {
  const out = [];
  for (let i = 1; i <= 16; i++) {
    const v = state.inv[i];
    if (v) out.push(ITEM_DISPLAY[v] || v);
  }
  return out;
}

function inventarLines(state) {
  const items = [];
  for (let i = 1; i <= 16; i++) if (state.inv[i]) items.push(ITEM_DISPLAY[state.inv[i]] || state.inv[i]);
  const lines = [{ text: "", pen: 7 }, { text: "Du trägst folgende Gegenstände bei dir :", pen: 7 }];
  if (items.length === 0) lines.push({ text: "(nichts)", pen: 9 });
  else for (const n of items) lines.push({ text: n, pen: 9 });
  return lines;
}

function infoLines() {
  return [{ text: "", pen: 7 }, ...TEXTS.info.map((t) => ({ text: t, pen: 7 }))];
}

async function deathSequence() {
  help.hide(); // no help on the death screen
  // 1) The death text ("Du bist tot." etc.) is already on screen — printed by the
  //    play loop before we got here. Let the player read it and click to continue.
  await ui.pressToContinue("Bitte klicken.");
  // 2) Then the death picture together with the death music; wait for another click.
  audio.play("death");
  await ui.imageScreen("assets/death.png", { label: "Bitte klicken." });
  // 3) Back to the title screen with the title music. (The death track used to keep
  //    looping into the menu because nothing switched it back.)
  audio.play("intro");
}

async function ending() {
  help.hide(); // no help on the victory screen
  audio.play("ending");
  // The sunset picture stays fixed on top; the credits scroll in the band below it.
  await ui.scrollText(TEXTS.ending, { image: "assets/ending.png" });
  location.reload(); // after the credits (on skip), restart fresh as if the page was reloaded
}

// Small fixed music on/off toggle in the corner.
function addMuteButton(root) {
  const b = document.createElement("button");
  b.id = "mute";
  b.className = "mute";
  b.type = "button";
  const sync = () => {
    b.textContent = tr(audio.isMuted() ? "🔇 Musik aus" : "🔊 Musik an");
    b.title = tr("Musik an/aus");
  };
  b.addEventListener("click", () => { audio.setMuted(!audio.isMuted()); sync(); });
  onLangChange(sync);
  sync();
  root.appendChild(b);
}

// DE/EN language switch, next to the help button. German browsers start in German,
// everyone else in English; the choice is remembered (see i18n.js).
function addLangSwitch(root) {
  const wrap = document.createElement("div");
  wrap.className = "lang-switch";
  const mk = (code) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = code.toUpperCase();
    btn.title = code === "de" ? "Auf Deutsch umschalten" : "Switch to English";
    btn.addEventListener("click", () => setLang(code));
    return btn;
  };
  const de = mk("de");
  const en = mk("en");
  const sync = () => {
    de.className = getLang() === "de" ? "active" : "";
    en.className = getLang() === "en" ? "active" : "";
  };
  onLangChange(sync);
  sync();
  wrap.appendChild(de);
  wrap.appendChild(en);
  root.appendChild(wrap);
  return { show() { wrap.style.display = ""; }, hide() { wrap.style.display = "none"; } };
}

// Boot once the DOM is ready.
const start = () => boot(document.getElementById("amiga"));
if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", start);
else start();
